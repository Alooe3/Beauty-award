<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Beauty Awards 2026 | Официальный сайт</title>
    <!-- Подключение библиотек для экспорта в PDF и иконок -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa820a;
            --bg-dark: #0a0b0d;
            --card-bg: #14161d;
            --text-main: #f5f5f7;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 10% 20%, rgba(212, 175, 55, 0.08) 0px, transparent 40%),
                radial-gradient(at 90% 80%, rgba(170, 130, 10, 0.08) 0px, transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Навигационная панель */
        header {
            background: rgba(20, 22, 29, 0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-menu {
            display: flex;
            gap: 25px;
        }
        .nav-menu a {
            color: #a0a5b5;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
        }
        .nav-menu a:hover {
            color: var(--gold-primary);
        }

        /* Главная секция сайта */
        .hero {
            padding: 140px 20px 60px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 1.2s ease-out;
        }
        .hero h1 {
            font-size: 48px;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .hero p {
            font-size: 18px;
            color: #a0a5b5;
            margin: 15px 0 30px;
        }

        /* Общие контейнеры секций */
        .section-container {
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }
        .section-title {
            font-size: 28px;
            color: var(--gold-primary);
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: var(--gold-primary);
            margin: 10px auto 0;
        }

        /* Блок Абсолютного Финалиста */
        .winner-card {
            background: linear-gradient(145deg, #181a24 0%, #101117 100%);
            border: 2px solid var(--gold-primary);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
position: relative;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.1);
            transform: translateY(0);
            transition: 0.4s ease;
            max-width: 600px;
            margin: 0 auto 50px;
        }
        .winner-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(212, 175, 55, 0.2);
        }
        .winner-badge {
            background: var(--gold-primary);
            color: #111;
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 14px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
        }
        .winner-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(var(--gold-primary), var(--gold-dark));
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #111;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }
        .winner-name {
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 10px;
            color: #fff;
        }
        .winner-score {
            color: var(--gold-primary);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Кнопки действий */
        .btn {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
            background-size: 200% auto;
            color: #111;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: 0.4s;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn:hover {
            background-position: right center;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        /* Сетке судей */
        .judges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .judge-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .judge-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
        }
        .judge-icon {
            width: 70px;
            height: 70px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-primary);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .judge-card h3 {
            margin: 0 0 5px;
            font-size: 19px;
        }
        .judge-card p {
            color: #808595;
            font-size: 14px;
            margin: 0 0 15px;
        }
        .judge-status {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--gold-light);
            cursor: pointer;
            transition: 0.2s;
        }
        .judge-status:hover {
            background: rgba(212, 175, 55, 0.15);
        }

        /* Таблица результатов конкурса */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 15px;
            overflow-x: auto;
border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }
        th {
            background-color: rgba(212, 175, 55, 0.05);
            color: var(--gold-primary);
            padding: 16px 20px;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 15px;
        }
        tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        .place-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
        }
        .place-1 { background: var(--gold-primary); color: #111; box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
        .place-2 { background: #c0c0c0; color: #111; }
        .place-3 { background: #cd7f32; color: #111; }
        .place-other { background: rgba(255,255,255,0.1); color: #ccc; }

        /* Всплывающий скрытый контейнер А4 для экспорта в PDF */
        #hidden-certificate-container {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
        .certificate-wrapper {
            background-color: #fff8dc;
            width: 210mm;
            height: 297mm;
            padding: 12mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
